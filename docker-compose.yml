services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-household_budget}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-household_budget}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${DB_PASSWORD:-change-me-in-production}@db:5432/${POSTGRES_DB:-household_budget}
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me-min-16-chars}
      APP_URL: ${APP_URL:-http://localhost:5173}
      API_URL: ${API_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      SEED_DEMO_USER: ${SEED_DEMO_USER:-true}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
    ports:
      - '${API_PORT:-3000}:3000'

  mailpit:
    image: axllent/mailpit:latest
    profiles: [dev]
    ports:
      - '8025:8025'
      - '1025:1025'

volumes:
  pgdata:
